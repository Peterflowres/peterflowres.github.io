<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sistema de Citas</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f1f5f9;
}

.loading{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:20px;
}

.spinner{
    width:45px;
    height:45px;
    border-radius:50%;
    border:4px solid #dbeafe;
    border-top:4px solid #2563eb;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.container{
    max-width:950px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:18px;
    padding:24px;
    box-shadow:0 4px 20px rgba(0,0,0,.06);
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
}

@media(max-width:800px){
    .grid{
        grid-template-columns:1fr;
    }
}

.input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #dbeafe;
    outline:none;
    background:#f8fafc;
    font-size:15px;
}

.input:focus{
    border-color:#2563eb;
    background:white;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:12px;
    font-weight:bold;
    color:#64748b;
    text-transform:uppercase;
}

.btn{
    width:100%;
    border:none;
    background:#2563eb;
    color:white;
    padding:15px;
    border-radius:14px;
    cursor:pointer;
    font-weight:bold;
    font-size:15px;
}

.btn:hover{
    background:#1d4ed8;
}

.slot-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
    gap:10px;
}

.slot{
    padding:12px;
    border-radius:12px;
    border:2px solid #dbeafe;
    background:white;
    cursor:pointer;
    font-weight:bold;
}

.slot:hover{
    background:#eff6ff;
}

.slot.selected{
    background:#2563eb;
    color:white;
    border-color:#2563eb;
}

.slot.disabled{
    background:#fee2e2;
    border:none;
    color:#dc2626;
    cursor:not-allowed;
}

.nav{
    background:white;
    border-bottom:1px solid #e2e8f0;
    padding:14px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-weight:900;
    font-size:20px;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
}

.modal-content{
    background:white;
    width:90%;
    max-width:420px;
    border-radius:20px;
    padding:24px;
}

.summary{
    background:#f8fafc;
    padding:12px;
    border-radius:12px;
    margin-bottom:12px;
}

.success{
    text-align:center;
    background:white;
    padding:40px;
    border-radius:24px;
}

.success-code{
    font-size:30px;
    font-weight:900;
    letter-spacing:3px;
    margin-top:12px;
}
</style>
</head>

<body>

<div id="app" class="loading">
    <div class="spinner"></div>
    <div>Cargando sistema...</div>
</div>

<script>

const supabaseUrl = 'https://bijqxtrtacnaurfouvot.supabase.co';

const supabaseKey = 'TU_SUPABASE_KEY';

const client = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);

let citas = [];
let fechaSeleccionada = new Date();
let horarioSeleccionado = null;

async function cargarCitas(){

    const { data, error } = await client
        .from("appointments")
        .select("*");

    if(error){
        console.error(error);
        return;
    }

    citas = data || [];
}

function formatoFecha(fecha){

    const y = fecha.getFullYear();
    const m = String(fecha.getMonth()+1).padStart(2,"0");
    const d = String(fecha.getDate()).padStart(2,"0");

    return `${y}-${m}-${d}`;
}

function generarSlots(){

    const slots = [];

    const hoy = new Date();

    for(let h=9; h<17; h++){

        for(let m=0; m<60; m+=30){

            const hora = String(h).padStart(2,"0");
            const min = String(m).padStart(2,"0");

            const key = `${hora}:${min}`;

            const fechaActual = formatoFecha(fechaSeleccionada);

            const ocupado = citas.some(c =>
                c.appointment_date === fechaActual &&
                c.appointment_time === key
            );

            const tempDate = new Date(fechaSeleccionada);

            tempDate.setHours(h,m,0,0);

            const pasado = tempDate < hoy;

            slots.push({
                key,
                ocupado,
                pasado
            });
        }
    }

    return slots;
}

function render(){

    const fechaStr = formatoFecha(fechaSeleccionada);

    document.getElementById("app").innerHTML = `

    <div class="nav">
        <div class="logo">📅 Sistema de Citas</div>
    </div>

    <div class="container">

        <div class="grid">

            <div class="card">

                <h2>Reserva tu cita</h2>

                <div style="margin-bottom:16px;">
                    <label>Nombre</label>
                    <input id="nombre" class="input" />
                </div>

                <div style="margin-bottom:16px;">
                    <label>Teléfono</label>
                    <input id="telefono" class="input" />
                </div>

                <div style="margin-bottom:20px;">
                    <label>Email</label>
                    <input id="email" class="input" />
                </div>

                <button class="btn" onclick="confirmarCita()">
                    Confirmar cita
                </button>

            </div>

            <div>

                <div class="card" style="margin-bottom:20px;">

                    <label>Fecha</label>

                    <input
                        id="fecha"
                        type="date"
                        class="input"
                        value="${fechaStr}"
                        min="${formatoFecha(new Date())}"
                    />

                </div>

                <div class="card">

                    <h3>Horarios disponibles</h3>

                    <div class="slot-grid">

                    ${
                        generarSlots().map(slot=>{

                            if(slot.ocupado){

                                return `
                                <button class="slot disabled">
                                    ❌ ${slot.key}
                                </button>
                                `;
                            }

                            if(slot.pasado){

                                return `
                                <button class="slot disabled">
                                    🕐 ${slot.key}
                                </button>
                                `;
                            }

                            return `
                            <button
                                class="slot ${horarioSeleccionado===slot.key?'selected':''}"
                                onclick="seleccionarHorario('${slot.key}')"
                            >
                                ${slot.key}
                            </button>
                            `;

                        }).join("")
                    }

                    </div>

                </div>

            </div>

        </div>

    </div>
    `;

    document
        .getElementById("fecha")
        .addEventListener("change",(e)=>{

            fechaSeleccionada = new Date(
                e.target.value + "T00:00:00"
            );

            horarioSeleccionado = null;

            render();
        });
}

function seleccionarHorario(hora){

    horarioSeleccionado = hora;

    render();
}

function validarTelefono(t){

    return /^[0-9]{10}$/.test(t);
}

function validarEmail(e){

    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
}

async function confirmarCita(){

    const nombre =
        document.getElementById("nombre").value.trim();

    const telefono =
        document.getElementById("telefono").value.trim();

    const email =
        document.getElementById("email").value.trim();

    if(!nombre){
        alert("Ingresa nombre");
        return;
    }

    if(!validarTelefono(telefono)){
        alert("Teléfono inválido");
        return;
    }

    if(!validarEmail(email)){
        alert("Email inválido");
        return;
    }

    if(!horarioSeleccionado){
        alert("Selecciona horario");
        return;
    }

    const codigo = Math.random()
        .toString(36)
        .substring(2,8)
        .toUpperCase();

    const cita = {

        client_name:nombre,
        client_phone:telefono,
        client_email:email,
        appointment_date:formatoFecha(fechaSeleccionada),
        appointment_time:horarioSeleccionado,
        client_verification_code:codigo
    };

    mostrarModal(cita);
}

function mostrarModal(cita){

    const modal = document.createElement("div");

    modal.className = "modal";

    modal.innerHTML = `
        <div class="modal-content">

            <h2>Confirmar cita</h2>

            <div class="summary">
                👤 ${cita.client_name}
            </div>

            <div class="summary">
                📞 ${cita.client_phone}
            </div>

            <div class="summary">
                ✉️ ${cita.client_email}
            </div>

            <div class="summary">
                📅 ${cita.appointment_date}
            </div>

            <div class="summary">
                🕐 ${cita.appointment_time}
            </div>

            <button class="btn" onclick='guardarFinal(${JSON.stringify(cita)})'>
                Confirmar
            </button>

            <button
                class="btn"
                style="margin-top:10px;background:#e2e8f0;color:black;"
                onclick="this.closest('.modal').remove()"
            >
                Cancelar
            </button>

        </div>
    `;

    document.body.appendChild(modal);
}

async function guardarFinal(cita){

    const { error } = await client
        .from("appointments")
        .insert([cita]);

    if(error){
        alert(error.message);
        return;
    }

    await cargarCitas();

    document.body.innerHTML = `
        <div class="container">

            <div class="success">

                <h1>✅ Cita confirmada</h1>

                <p>
                    Tu cita fue guardada correctamente
                </p>

                <div class="success-code">
                    ${cita.client_verification_code}
                </div>

                <button
                    class="btn"
                    style="margin-top:24px;"
                    onclick="location.reload()"
                >
                    Nueva cita
                </button>

            </div>

        </div>
    `;
}

async function init(){

    await cargarCitas();

    render();
}

init();

</script>

</body>
</html>
